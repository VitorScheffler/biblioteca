<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <!-- importante para iOS fullscreen / safe-area -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leitor PDF — Biblioteca</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="reader-body">

<nav class="navbar bg-light shadow-sm px-2 reader-nav">
  <a href="/" class="btn btn-link">← Voltar</a>

  <div class="ms-auto d-flex gap-2 align-items-center">
    <button id="zoomOut" class="btn btn-sm btn-outline-secondary" aria-label="Diminuir zoom">−</button>
    <button id="zoomIn" class="btn btn-sm btn-outline-secondary" aria-label="Aumentar zoom">+</button>
    <button id="toggleDark" class="btn btn-sm btn-outline-secondary" aria-pressed="false" aria-label="Modo escuro">🌙</button>
    <button id="toggleFull" class="btn btn-sm btn-outline-secondary" aria-pressed="false" aria-label="Tela cheia">⛶</button>
  </div>
</nav>

<!-- container do PDF -->
<main id="pdfViewer" class="pdf-viewer" role="main" aria-live="polite"></main>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- nosso JS do leitor -->
<script src="/assets/js/reader.js"></script>
</body>
</html>
