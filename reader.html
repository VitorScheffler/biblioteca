<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Leitor — PDF</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- PDF.js CDN (fallback: veja notas no script) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a id="btn-back" class="btn btn-sm btn-light">← Biblioteca</a>
    <div class="d-flex gap-2 align-items-center">
      <button id="btn-fullscreen" class="btn btn-sm btn-dark">⛶ Tela cheia</button>
      <button id="btn-zoom-out" class="btn btn-sm btn-outline-light">-</button>
      <button id="btn-zoom-in" class="btn btn-sm btn-outline-light">+</button>
      <button id="btn-fit" class="btn btn-sm btn-outline-light">Ajustar largura</button>
      <span id="progress" class="text-light ms-2">0%</span>
      <span id="page-info" class="text-light ms-2">— / —</span>
    </div>
  </div>
</nav>

<main class="container-fluid p-0">
  <section id="reader-wrapper" class="reader-card">
    <div id="pdf-viewer" class="reader-body"></div>
  </section>
</main>

<script src="assets/js/reader.js"></script>
</body>
</html>
