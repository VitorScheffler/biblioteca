<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Leitor — Biblioteca</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="reader-body">

<nav class="reader-nav d-flex align-items-center px-2">
  <a class="btn btn-link btn-sm" href="/" aria-label="Voltar">← Voltar</a>

  <div class="ms-2 me-auto reader-meta">
    <div id="titleDisplay" class="reader-title">Abrindo PDF...</div>
    <div id="pageIndicator" class="text-muted small">—</div>
  </div>

  <div class="d-flex gap-2 align-items-center">
    <button id="prevPage" class="btn btn-outline-secondary btn-sm" aria-label="Página anterior">◀</button>
    <button id="nextPage" class="btn btn-outline-secondary btn-sm" aria-label="Próxima página">▶</button>
    <button id="zoomOut" class="btn btn-outline-secondary btn-sm" aria-label="Diminuir zoom">−</button>
    <button id="zoomIn" class="btn btn-outline-secondary btn-sm" aria-label="Aumentar zoom">+</button>
    <button id="toggleDark" class="btn btn-outline-secondary btn-sm" aria-pressed="false" aria-label="Modo escuro">🌙</button>
    <button id="toggleFull" class="btn btn-outline-secondary btn-sm" aria-pressed="false" aria-label="Tela cheia">⛶</button>
  </div>
</nav>

<main id="pdfViewer" class="pdf-viewer" role="main" aria-live="polite"></main>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- Nosso JS do leitor -->
<script src="/assets/js/reader.js"></script>
</body>
</html>
