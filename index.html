<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Biblioteca — PDF</title>

  <!-- PWA / iOS meta -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#071019">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#0b0d0f; color:#e6eef8; font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; }
    .book-cover { height:190px; object-fit:cover; border-top-left-radius: .375rem; border-top-right-radius: .375rem; }
    .card { background:#0f1724; border:0; color:inherit; }
    /* Modal small-screen fullscreen tweak */
    @media (max-width: 576px) {
      #readerModal .modal-content { height: 100vh; border-radius: 0; background: #071019; }
      #readerModal .modal-body { padding:0; }
      #readerIframe { height: calc(100vh - var(--reader-header-height, 56px)); }
    }
  </style>
</head>
<body class="p-3">
  <div class="container">
    <h3 class="mb-3">Minha Biblioteca</h3>

    <div id="emptyNotice" class="alert alert-warning d-none">Nenhum livro encontrado.</div>

    <div class="row g-3" id="booksGrid"></div>
  </div>

  <!-- Modal: leitor -->
  <div class="modal fade" id="readerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header py-2 px-3" id="readerHeader" style="--reader-header-height:56px;">
          <div>
            <h6 class="modal-title mb-0" id="readerTitle">Livro</h6>
            <small id="readerAuthor" class="text-muted">Autor</small>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <button id="readerClearBtn" class="btn btn-sm btn-outline-light">Limpar progresso</button>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
        </div>

        <div class="modal-body p-0" style="height:calc(100vh - 56px);">
          <!-- iframe que carrega viewer.html -->
          <iframe id="readerIframe" src="" style="width:100%; height:100%; border:0;" title="Leitor de PDF"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script de controle (carrega books.json e controla modal) -->
  <script>
    const grid = document.getElementById('booksGrid');
    const emptyNotice = document.getElementById('emptyNotice');
    const readerIframe = document.getElementById('readerIframe');
    const readerTitle = document.getElementById('readerTitle');
    const readerAuthor = document.getElementById('readerAuthor');
    const readerClearBtn = document.getElementById('readerClearBtn');
    let currentBookFile = null;

    fetch('books.json', { cache: 'no-store' })
      .then(res => {
        if(!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        if(!Array.isArray(data) || data.length === 0){
          emptyNotice.classList.remove('d-none');
          return;
        }
        renderBooks(data);
      })
      .catch(err => {
        console.error('Erro carregando books.json', err);
        emptyNotice.textContent = 'Erro carregando lista de livros. Verifique books.json (console para detalhes).';
        emptyNotice.classList.remove('d-none');
      });

    function renderBooks(books){
      grid.innerHTML = '';
      books.forEach(book => {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-3';

        const cover = book.cover && book.cover.trim() ? book.cover : '';
        const coverHtml = cover
          ? `<img src="${cover}" alt="${escapeHtml(book.title)}" class="book-cover w-100">`
          : `<div style="height:190px;background:#e6edf6;color:#0b0d0f;display:flex;align-items:center;justify-content:center;font-weight:600">PDF</div>`;

        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            ${coverHtml}
            <div class="card-body">
              <h6 class="mb-1" style="font-size:14px">${escapeHtml(book.title)}</h6>
              <small class="text-muted">${escapeHtml(book.author || '')}</small>
            </div>
          </div>
        `;

        col.addEventListener('click', () => openReader(book));
        grid.appendChild(col);
      });
    }

    function openReader(book){
      currentBookFile = book.file;
      readerTitle.textContent = book.title || decodeURIComponent(book.file || '');
      readerAuthor.textContent = book.author || '';

      // adiciona minimalUI=1 para habilitar comportamento mobile-friendly no viewer
      const src = `viewer.html?file=${encodeURIComponent(book.file)}&title=${encodeURIComponent(book.title || '')}&minimalUI=1`;
      readerIframe.src = src;

      const modalEl = document.getElementById('readerModal');
      const modal = new bootstrap.Modal(modalEl, { backdrop: 'static', keyboard: true });
      modal.show();

      modalEl.addEventListener('hidden.bs.modal', function onHidden(){
        readerIframe.src = '';
        document.getElementById('readerHeader').classList.remove('d-none');
        modalEl.removeEventListener('hidden.bs.modal', onHidden);
      }, { once:true });
    }

    readerClearBtn.addEventListener('click', ()=>{
      if(!currentBookFile) return alert('Nenhum livro aberto.');
      const key = 'pdf-progress-' + currentBookFile;
      localStorage.removeItem(key);
      alert('Progresso limpo para este livro.');
    });

    // recebe mensagens do viewer (iframe)
    window.addEventListener('message', (ev) => {
      if(!ev.data || typeof ev.data !== 'object') return;
      const data = ev.data;
      if(data.type === 'toggle_ui'){
        const header = document.getElementById('readerHeader');
        if(data.hidden) header.classList.add('d-none');
        else header.classList.remove('d-none');
      } else if(data.type === 'ui_hidden'){
        document.getElementById('readerHeader').classList.add('d-none');
      } else if(data.type === 'ui_shown'){
        document.getElementById('readerHeader').classList.remove('d-none');
      }
    });

    function escapeHtml(s){
      if(!s) return '';
      return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
    }
  </script>
</body>
</html>
