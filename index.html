<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Minha Biblioteca PDF</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PDF.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">📚 Minha Biblioteca</span>
        <div class="d-flex gap-2">
            <button id="btn-open-library" class="btn btn-sm btn-outline-light">Biblioteca</button>
        </div>
    </div>
</nav>

<main class="container my-3">

    <!-- Biblioteca -->
    <section id="library" class="row g-3">
        <!-- Cards gerados por script -->
    </section>

    <!-- Leitor -->
    <section id="reader-container" class="d-none card shadow-sm">
        <div class="reader-top d-flex align-items-center justify-content-between p-2">
            <div class="d-flex gap-2 align-items-center">
                <button id="btn-back" class="btn btn-light btn-sm">← Voltar</button>
                <button id="btn-fullscreen" class="btn btn-dark btn-sm">⛶</button>
                <button id="btn-zoom-out" class="btn btn-outline-secondary btn-sm">-</button>
                <button id="btn-zoom-in" class="btn btn-outline-secondary btn-sm">+</button>
                <button id="btn-fit" class="btn btn-outline-secondary btn-sm">Ajustar largura</button>
            </div>

            <div class="d-flex align-items-center gap-2">
                <small id="progress" class="text-muted">0%</small>
                <small id="page-info" class="text-muted">Página — / —</small>
            </div>
        </div>

        <div id="pdf-viewer" class="reader-body">
            <!-- Páginas (div.pdf-page) serão injetadas aqui -->
        </div>
    </section>
</main>

<!-- Script principal -->
<script src="assets/js/script.js"></script>
</body>
</html>
