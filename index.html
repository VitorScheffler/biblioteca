<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Biblioteca — PDFs</title>

  <!-- Fonte minimalista -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap (utilities only) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos principais -->
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="index-body">

<header class="topbar">
  <div class="container-fluid d-flex align-items-center gap-2">
    <div class="d-flex align-items-center gap-2">
      <button id="menuBtn" class="btn btn-ghost" aria-label="Menu">☰</button>
      <h1 class="title mb-0">Biblioteca</h1>
    </div>

    <div class="ms-auto d-flex align-items-center gap-2">
      <input id="searchInput" class="form-control form-control-sm search" type="search" placeholder="Buscar título ou autor" aria-label="Buscar livros">
      <button id="toggleDarkIndex" class="btn btn-outline-secondary btn-sm" aria-pressed="false" aria-label="Alternar modo escuro">🌙</button>
    </div>
  </div>
</header>

<main class="container-fluid py-3">
  <section id="booksGrid" class="row g-3" aria-live="polite"></section>

  <div id="noResults" class="text-center text-muted mt-4 d-none">Nenhum livro encontrado.</div>
</main>

<footer class="footer text-center py-3 small text-muted">
  Feito com ♥ — Apenas PDFs — Estático (Vercel)
</footer>

<script src="/assets/js/app.js"></script>
</body>
</html>
