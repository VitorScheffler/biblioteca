<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Biblioteca — PDF</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">📚 Minha Biblioteca</span>
    <div class="d-flex gap-2 align-items-center">
      <input id="search" class="form-control form-control-sm search-input" type="search" placeholder="Pesquisar livros..." aria-label="Pesquisar livros">
      <button id="btn-refresh" class="btn btn-sm btn-outline-light">🔄</button>
    </div>
  </div>
</nav>

<main class="container my-3">
  <div class="mb-2 d-flex justify-content-between align-items-center">
    <small class="text-muted">Toque em um livro para abrir no leitor.</small>
  </div>
  <div id="library" class="row g-3"></div>
</main>

<script src="assets/js/library.js"></script>
</body>
</html>
