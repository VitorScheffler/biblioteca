<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Biblioteca PDF</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">📚 Minha Biblioteca</span>
</nav>

<div class="container my-4">

    <!-- Biblioteca -->
    <div id="library" class="row g-4"></div>

    <!-- Leitor -->
    <div id="reader-container" class="d-none">

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span id="progress">0%</span>

        <div>
            <button id="fullscreen" class="btn btn-dark btn-sm">⛶ Tela cheia</button>
            <button id="closeReader" class="btn btn-danger btn-sm">Fechar</button>
        </div>
    </div>

    <div id="pdf-viewer"></div>

</div>

</div>

<script src="assets/js/script.js"></script>
</body>
</html>
