<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Leitor — PDF</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';
</script>

<style>
:root{
  --bg:#0b0d0f;
  --text:#e6eef8;
  --accent:#2b82ff;
}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto;
}

.viewer-root{
  height:100dvh;
  width:100vw;
  position:relative;
  overflow:hidden;
}

.canvas-area{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}

canvas{
  background:#fff;
  display:block;
  max-width:100%;
  height:auto;
  border-radius:6px;
}

.progress{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 32px);
  max-width:720px;
  background:rgba(255,255,255,.06);
  padding:8px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.track{
  flex:1;
  height:6px;
  background:rgba(255,255,255,.1);
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),#66a6ff);
}

.label{
  font-size:12px;
  white-space:nowrap;
}

.hidden{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>
<div class="viewer-root" id="viewerRoot">
  <div class="canvas-area" id="canvasArea">
    <canvas id="pdfCanvas"></canvas>
  </div>

  <div class="progress" id="progress">
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <div class="label" id="label">0 / 0</div>
  </div>
</div>

<script>
(async ()=>{
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  if(!file) return alert('Arquivo não informado');

  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');
  const area = document.getElementById('canvasArea');
  const fill = document.getElementById('fill');
  const label = document.getElementById('label');
  const progress = document.getElementById('progress');

  let pdf, pageNum = 1, total = 0;
  let rendering = false;
  let queued = null;
  let zoomManual = false;
  let scale = 1;

  const isMobile = window.matchMedia('(max-width: 768px)').matches;

  pdf = await pdfjsLib.getDocument(file).promise;
  total = pdf.numPages;
  render(pageNum);

  async function render(n){
    rendering = true;
    const page = await pdf.getPage(n);

    const base = page.getViewport({ scale:1 });
    const areaW = area.clientWidth;
    const areaH = area.clientHeight;

    if(!zoomManual){
      if(isMobile){
        // 🔥 MOBILE: sempre ajustar pela largura
        scale = areaW / base.width;
        scale = Math.max(scale, 1.1); // nunca pequeno
      }else{
        // DESKTOP: caber inteiro
        scale = Math.min(
          areaW / base.width,
          areaH / base.height
        );
      }
    }

    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: scale * dpr });

    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = vp.width / dpr + 'px';
    canvas.style.height = vp.height / dpr + 'px';

    ctx.setTransform(dpr,0,0,dpr,0,0);
    await page.render({ canvasContext:ctx, viewport:page.getViewport({ scale }) }).promise;

    fill.style.width = (n/total*100)+'%';
    label.textContent = `Página ${n} / ${total}`;

    rendering = false;
    if(queued){
      const q = queued;
      queued = null;
      render(q);
    }
  }

  function go(n){
    if(rendering) queued = n;
    else{
      pageNum = Math.max(1,Math.min(total,n));
      render(pageNum);
    }
  }

  // swipe — UMA página por gesto
  let sx = 0, sy = 0;
  canvas.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, {passive:true});

  canvas.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;

    if(dx < 0) go(pageNum + 1);
    else go(pageNum - 1);
  }, {passive:true});

  // tap → esconder menu
  canvas.addEventListener('click', ()=>{
    progress.classList.toggle('hidden');
    try{
      parent.postMessage(
        { type:'toggle_ui', hidden:progress.classList.contains('hidden') },
        '*'
      );
    }catch{}
  });

  window.addEventListener('resize', ()=>render(pageNum));
})();
</script>
</body>
</html>
