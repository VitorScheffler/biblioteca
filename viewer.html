<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leitor — PDF</title>

  <!-- PDF.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
  <script>
    // worker
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';
  </script>

  <style>
    :root{
      --bg: #0b0d0f;
      --text: #e6eef8;
      --accent: #2b82ff;
    }
    html,body { height:100%; margin:0; background:var(--bg); color:var(--text); font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; }
    /* Container that centers the PDF */
    .viewer-root { height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .canvas-area { max-width:100%; max-height:100%; display:flex; align-items:center; justify-content:center; overflow:auto; padding:20px; box-sizing:border-box; width:100%; height:100%; }
    canvas.pdf-canvas { background:white; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.6); max-width:100%; height:auto; display:block; }

    /* progress bar (discreta) */
    .progress-bar-wrap {
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:18px;
      width:min(720px, calc(100% - 40px));
      background: rgba(255,255,255,0.03);
      border-radius:12px;
      padding:8px 10px;
      display:flex;
      gap:12px;
      align-items:center;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index:60;
      transition:opacity 220ms;
    }
    .progress-track {
      position:relative;
      height:6px;
      background: rgba(255,255,255,0.04);
      border-radius:999px;
      flex:1;
      overflow:hidden;
      cursor:pointer;
    }
    .progress-fill {
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background: linear-gradient(90deg, var(--accent), #66a6ff);
      border-radius:999px;
      transition: width 220ms ease;
    }
    .progress-label {
      min-width:140px;
      text-align:right;
      font-size:13px;
      color:var(--text);
      opacity:0.95;
    }

    /* center message */
    .center-msg {
      position:absolute;
      top:12px;
      left:12px;
      font-size:13px;
      color:rgba(230,238,248,0.95);
      background: rgba(0,0,0,0.2);
      padding:6px 8px;
      border-radius:8px;
      z-index:70;
      backdrop-filter: blur(3px);
    }

    /* fullscreen button */
    #fullscreenBtn{
      position:fixed;
      top:14px;
      right:14px;
      z-index:80;
      background:rgba(255,255,255,0.06);
      border:none;
      color:#fff;
      font-size:18px;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
      backdrop-filter: blur(4px);
    }
    #fullscreenBtn:active{ transform:scale(0.96); }

    /* fake fullscreen class — used on iOS where native Fullscreen is limited */
    .fake-fullscreen{
      position:fixed !important;
      inset:0 !important;
      width:100vw !important;
      height:100vh !important;
      z-index:9999 !important;
      background:var(--bg);
    }

    /* auto-hide support: hide progress after inactivity */
    .hidden-ui { opacity:0; pointer-events:none; }

    @media (max-width:520px){
      .progress-bar-wrap { bottom:12px; padding:6px 8px; width:calc(100% - 28px); }
      .progress-label { min-width:100px; font-size:12px; }
      #fullscreenBtn { top:10px; right:10px; padding:7px 9px; font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="viewer-root" id="viewerRoot">
    <div class="canvas-area" id="canvasArea">
      <canvas id="pdfCanvas" class="pdf-canvas" role="img" aria-label="Página do PDF"></canvas>
    </div>

    <div id="centerMsg" class="center-msg" style="display:none">Mensagem</div>

    <button id="fullscreenBtn" aria-label="Tela cheia">⤢</button>

    <div class="progress-bar-wrap" id="progressWrap" title="Clique para pular para uma posição">
      <div class="progress-track" id="progressTrack" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">Página 0 / 0 — 0%</div>
    </div>
  </div>

<script>
(async function(){
  // parâmetros
  const params = new URLSearchParams(location.search);
  const file = params.get('file') || '';
  const titleParam = params.get('title') || '';

  // elementos
  const viewerRoot = document.getElementById('viewerRoot');
  const canvasArea = document.getElementById('canvasArea');
  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d', { alpha:false });
  const centerMsg = document.getElementById('centerMsg');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const progressTrack = document.getElementById('progressTrack');
  const progressWrap = document.getElementById('progressWrap');
  const fsBtn = document.getElementById('fullscreenBtn');

  if(!file){
    showMsg('Arquivo não informado — use ?file=/books/seuarquivo.pdf', 0);
    return;
  }

  // estado
  let pdf = null;
  let pageNum = 1;
  let totalPages = 0;
  let rotation = 0;
  let scale = 1;
  let rendering = false;
  let queuedPage = null;
  let zoomManual = false;
  const storageKey = 'pdf-progress-' + file;

  // recuperar progresso
  const saved = parseInt(localStorage.getItem(storageKey));
  if(!isNaN(saved) && saved >= 1) pageNum = saved;

  // helper UI
  function showMsg(txt, timeout=3000){
    centerMsg.textContent = txt;
    centerMsg.style.display = 'block';
    if(timeout > 0){
      clearTimeout(showMsg._t);
      showMsg._t = setTimeout(()=> centerMsg.style.display = 'none', timeout);
    }
  }

  // Carregar PDF
  showMsg('Carregando...');
  try{
    const loadingTask = pdfjsLib.getDocument({ url: file, withCredentials:false });
    pdf = await loadingTask.promise;
    totalPages = pdf.numPages;
    if(pageNum > totalPages) pageNum = 1;
    updateProgressUI();
    queueRender(pageNum);
    showMsg('Pronto', 700);
  } catch(err){
    console.error(err);
    showMsg('Erro ao carregar PDF — verifique o caminho e o servidor', 8000);
    return;
  }

  // RENDER
  async function renderPage(n){
    rendering = true;
    try {
      const page = await pdf.getPage(n);
      // compute fit scale if not manual zoom
      const vp1 = page.getViewport({ scale:1, rotation });
      const containerW = Math.max(80, canvasArea.clientWidth - 40);
      const containerH = Math.max(80, canvasArea.clientHeight - 40);
      if(!zoomManual){
        const scaleX = containerW / vp1.width;
        const scaleY = containerH / vp1.height;
        scale = Math.min(scaleX, scaleY, 2.5);
        scale = Math.max(scale, 0.35);
      }
      const outputScale = window.devicePixelRatio || 1;
      const viewport = page.getViewport({ scale: scale * outputScale, rotation });
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.style.width = Math.floor(viewport.width / outputScale) + 'px';
      canvas.style.height = Math.floor(viewport.height / outputScale) + 'px';

      // clear
      ctx.save();
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,canvas.width, canvas.height);
      ctx.restore();

      const renderContext = { canvasContext: ctx, viewport: page.getViewport({ scale: scale * outputScale, rotation }) };
      const renderTask = page.render(renderContext);
      await renderTask.promise;

      // after render
      rendering = false;
      localStorage.setItem(storageKey, n);
      updateProgressUI();
      if(queuedPage && queuedPage !== n){
        const next = queuedPage; queuedPage = null;
        queueRender(next);
      }
    } catch(err){
      console.error('Render error', err);
      rendering = false;
      showMsg('Erro ao renderizar página', 3000);
    }
  }

  function queueRender(n){
    if(rendering){
      queuedPage = n;
    } else {
      pageNum = n;
      renderPage(n);
    }
  }

  // update progress UI
  function updateProgressUI(){
    const pct = totalPages ? Math.round((pageNum/totalPages)*100) : 0;
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `Página ${pageNum} / ${totalPages} — ${pct}%`;
  }

  // Navigation via click/tap
  canvas.addEventListener('click', (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if(x < rect.width * 0.42){
      if(pageNum > 1) queueRender(pageNum - 1);
    } else if(x > rect.width * 0.58){
      if(pageNum < totalPages) queueRender(pageNum + 1);
    } else {
      toggleZoom();
    }
  });

  // touch support
  let touchStartX = null;
  canvas.addEventListener('touchstart', (e)=>{ if(e.touches && e.touches[0]) touchStartX = e.touches[0].clientX; }, {passive:true});
  canvas.addEventListener('touchend', (e)=>{
    if(!touchStartX) return;
    const touchEndX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : null;
    if(touchEndX === null){ touchStartX = null; return; }
    const rect = canvas.getBoundingClientRect();
    const x = touchEndX - rect.left;
    if(x < rect.width * 0.42){ if(pageNum > 1) queueRender(pageNum - 1); }
    else if(x > rect.width * 0.58){ if(pageNum < totalPages) queueRender(pageNum + 1); }
    else { toggleZoom(); }
    touchStartX = null;
  }, {passive:true});

  // progress bar click to jump
  progressTrack.addEventListener('click', (e)=>{
    const r = progressTrack.getBoundingClientRect();
    const x = e.clientX - r.left;
    const pct = Math.max(0, Math.min(1, x / r.width));
    const targetPage = Math.max(1, Math.min(totalPages, Math.round(pct * totalPages)));
    queueRender(targetPage);
  });

  // keyboard nav
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowRight'){ if(pageNum < totalPages) queueRender(pageNum + 1); }
    if(e.key === 'ArrowLeft'){ if(pageNum > 1) queueRender(pageNum - 1); }
    if(e.key === 'Home'){ queueRender(1); }
    if(e.key === 'End'){ queueRender(totalPages); }
    if(e.key === '+' || e.key === '='){ manualZoom(scale * 1.15); }
    if(e.key === '-') { manualZoom(scale / 1.15); }
  });

  // Zoom toggle & manual zoom
  function toggleZoom(){
    if(!pdf) return;
    if(zoomManual){
      zoomManual = false;
      queueRender(pageNum);
    } else {
      zoomManual = true;
      manualZoom(1.0); // 100%
    }
  }

  function manualZoom(val){
    zoomManual = true;
    scale = Math.max(0.25, Math.min(4, val));
    // render current page with manual scale
    (async ()=>{
      if(!pdf) return;
      rendering = true;
      try {
        const page = await pdf.getPage(pageNum);
        const outputScale = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale: scale * outputScale, rotation });
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);
        canvas.style.width = Math.floor(viewport.width / outputScale) + 'px';
        canvas.style.height = Math.floor(viewport.height / outputScale) + 'px';
        ctx.save(); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width, canvas.height); ctx.restore();
        await page.render({ canvasContext: ctx, viewport: page.getViewport({ scale: scale * outputScale, rotation }) }).promise;
        rendering = false;
        updateProgressUI();
        localStorage.setItem(storageKey, pageNum);
        if(queuedPage && queuedPage !== pageNum){ const next = queuedPage; queuedPage = null; queueRender(next); }
      } catch(err){
        console.error(err);
        rendering = false;
      }
    })();
  }

  // resize -> re-render (fit) unless manual zoom
  let resizeTimer = null;
  window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(()=> {
      queueRender(pageNum);
    }, 160);
  });

  // Fullscreen handling (desktop/android real fullscreen, iOS simulated)
  function isIOS(){
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  }

  fsBtn.addEventListener('click', async ()=>{
    // desktop/Android real fullscreen
    if(!isIOS() && document.fullscreenEnabled){
      try {
        if(!document.fullscreenElement) await viewerRoot.requestFullscreen();
        else await document.exitFullscreen();
      } catch(e){
        console.warn('Fullscreen API falhou', e);
      }
    } else {
      // iOS - simulate by toggling fixed full-screen class
      viewerRoot.classList.toggle('fake-fullscreen');
      // rerender after layout change
      setTimeout(()=> queueRender(pageNum), 220);
    }
  });

  // update fs icon if leave by ESC
  document.addEventListener('fullscreenchange', ()=> {
    // no icon text change required; button remains ⤢
    // but we can ensure rerender
    setTimeout(()=> queueRender(pageNum), 120);
  });

  // auto-hide UI on inactivity (hide progressWrap and fsBtn)
  let hideUITimer = null;
  function scheduleHideUI(){
    progressWrap.classList.remove('hidden-ui');
    fsBtn.classList.remove('hidden-ui');
    clearTimeout(hideUITimer);
    hideUITimer = setTimeout(()=> {
      progressWrap.classList.add('hidden-ui');
      fsBtn.classList.add('hidden-ui');
    }, 3000);
  }
  // show UI on pointer move / touch
  ['mousemove','touchstart','wheel','touchmove'].forEach(ev=>{
    window.addEventListener(ev, scheduleHideUI, {passive:true});
  });
  // start schedule
  scheduleHideUI();

  // expose basic goToPage for potential external calls
  window.goToPage = function(n){
    if(!pdf) return;
    n = Math.max(1, Math.min(totalPages, Math.floor(n)));
    queueRender(n);
  };

  // end of async IIFE
})();
</script>
</body>
</html>
